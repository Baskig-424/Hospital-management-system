<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Navjivan Care</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/app.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="page-wrap">
    <div class="top-bar">
      <div class="brand-mark" style="font-size:20px;"><img class="brand-logo-img" src="../assets/navjivan-logo.jpg" alt="Navjivan Logo">
        <span class="navjivan">Navjivan</span> <span class="care">Care</span> Admin
      </div>
      <a href="index.html" class="badge" style="text-decoration:none;">Home</a>
    </div>

    <div class="grid center-page">
      <div class="card col-6 center-card">
        <h3>Admin Login</h3>
        <p class="muted">Use the fixed password from localstorage.xml</p>
        <form id="adminLoginForm" class="center-form">
          <label for="adminNumber">Number</label>
          <input id="adminNumber" type="tel" placeholder="Enter number" required>
          <div style="height:10px"></div>
          <label for="adminPassword">Password</label>
          <input id="adminPassword" type="password" required>
          <div style="height:12px"></div>
          <button type="submit">Login</button>
          <div id="adminError" class="muted" style="margin-top:8px;"></div>
        </form>
      </div>
    </div>
  </div>

  <script src="../js/store.js"></script>
</body>
</html>
